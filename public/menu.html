<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🥥 Menu Planner — OG Exodus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    color: #e2e8f0; padding: 12px;
  }
  .chat-container {
    width: 100%; max-width: 450px; height: 90dvh; max-height: 800px;
    background: #1e293b; border-radius: 24px; display: flex; flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,.5); overflow: hidden;
    position: relative;
  }
  .chat-header {
    padding: 20px 20px 14px; border-bottom: 1px solid #334155;
    text-align: center; flex-shrink: 0;
  }
  .chat-header h1 { font-size: 18px; font-weight: 600; color: #fbbf24; }
  .chat-header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

  .msg { max-width: 88%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .bot { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
  .user { align-self: flex-end; background: #fbbf24; color: #0f172a; border-bottom-right-radius: 4px; font-weight: 500; }

  .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .opt-btn {
    background: #1e293b; color: #e2e8f0; border: 1.5px solid #475569;
    padding: 10px 18px; border-radius: 100px; font-size: 13px; cursor: pointer;
    transition: all .15s; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .opt-btn:hover, .opt-btn:active { border-color: #fbbf24; color: #fbbf24; background: #0f172a; }
  .opt-btn.selected { background: #fbbf24; color: #0f172a; border-color: #fbbf24; font-weight: 600; }
  .opt-btn.confirm {
    background: #fbbf24; color: #0f172a; border-color: #fbbf24; font-weight: 700;
    width: 100%; padding: 14px; text-align: center;
  }

  .grocery-list { background: #0f172a; border-radius: 12px; padding: 16px; margin-top: 8px; }
  .grocery-list h3 { color: #fbbf24; font-size: 14px; margin-bottom: 8px; }
  .grocery-list ul { list-style: none; }
  .grocery-list li { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
  .grocery-list li:last-child { border: 0; }
  .grocery-list .qty { color: #94a3b8; }

  .input-bar {
    padding: 12px 16px; border-top: 1px solid #334155; display: flex; gap: 8px;
    flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 100px;
    padding: 10px 16px; color: #e2e8f0; font-size: 14px; outline: none;
  }
  .input-bar input:focus { border-color: #fbbf24; }
  .input-bar input::placeholder { color: #64748b; }
  .input-bar button {
    background: #fbbf24; color: #0f172a; border: none; border-radius: 100px;
    padding: 10px 20px; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .input-bar button:active { opacity: .7; }

  .hidden { display: none !important; }
  .tag { display: inline-block; background: #fbbf2433; color: #fbbf24; font-size: 11px; padding: 2px 8px; border-radius: 100px; margin-left: 6px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <h1>🥥 Menu Planner</h1>
    <p>Plan your meals — we shop & stock the boat</p>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-bar" id="inputBar">
    <input type="text" id="chatInput" placeholder="Type your answer..." autocomplete="off">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
(function() {
  // === State ===
  const state = {
    guests: null,
    days: null,
    restrictions: [],
    breakfast: [], lunch: [], dinner: [], snacks: [],
    mealsPerDay: [],
    step: 'welcome',
    currentQuestion: null,
  };

  const msgEl = document.getElementById('messages');
  const inputBar = document.getElementById('inputBar');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');

  function scrollBottom() {
    requestAnimationFrame(() => { msgEl.scrollTop = msgEl.scrollHeight; });
  }

  function addBot(text, extra) {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = text;
    msgEl.appendChild(div);
    if (extra) msgEl.appendChild(extra);
    scrollBottom();
  }

  function addUser(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.textContent = text;
    msgEl.appendChild(div);
    scrollBottom();
  }

  function showOptions(options, multi) {
    const wrap = document.createElement('div');
    wrap.className = 'options';
    const selected = new Set();
    options.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = label;
      btn.onclick = () => {
        if (multi) {
          btn.classList.toggle('selected');
          if (btn.classList.contains('selected')) selected.add(label);
          else selected.delete(label);
        } else {
          if (state.currentQuestion) state.currentQuestion(label);
          wrap.querySelectorAll('.opt-btn').forEach(b => b.remove());
          wrap.remove();
        }
      };
      wrap.appendChild(btn);
    });
    if (multi) {
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'opt-btn confirm';
      confirmBtn.textContent = '✅ Done';
      confirmBtn.onclick = () => {
        if (state.currentQuestion) state.currentQuestion([...selected]);
        wrap.remove();
      };
      wrap.appendChild(confirmBtn);
    }
    return wrap;
  }

  function hideInput() {
    inputBar.classList.add('hidden');
  }

  function showInput(placeholder, handler) {
    inputBar.classList.remove('hidden');
    chatInput.placeholder = placeholder || 'Type your answer...';
    chatInput.value = '';
    chatInput.focus();
    const onSubmit = () => {
      const val = chatInput.value.trim();
      if (!val) return;
      addUser(val);
      chatInput.value = '';
      if (handler) handler(val);
    };
    sendBtn.onclick = onSubmit;
    chatInput.onkeydown = e => { if (e.key === 'Enter') onSubmit(); };
  }

  // === Menu Options ===
  const BREAKFAST_ITEMS = [
    '🥞 Pancakes & syrup', '🍳 Eggs any style', '🥑 Avocado toast',
    '🌮 Breakfast burrito', '🥣 Granola & yogurt', '🥭 Tropical fruit bowl',
    '🥓 Full breakfast (eggs, bacon, toast)', '🥤 Smoothie bar',
  ];
  const LUNCH_ITEMS = [
    '🥗 Ceviche (fresh catch)', '🌯 Fish tacos', '🦞 Lobster ceviche',
    '🐙 Grilled octopus', '🥘 Paella (seafood or veg)',
    '🍝 Pasta salad', '🥩 Grilled chicken salad', '🍣 Tuna tartare',
    '🥪 Sandwiches & wraps', '🍉 Fruit & cheese platter',
  ];
  const DINNER_ITEMS = [
    '🐟 Grilled fresh catch of the day', '🦐 Garlic shrimp & rice',
    '🐟 Whole fried snapper', '🦞 Lobster thermidor',
    '🌮 Taco night (fish or pork)', '🍝 Pasta with seafood',
    '🔥 Mixed seafood grill', '🥩 Grilled steak & vegetables',
    '🍛 Curry (chicken or veg)', '🥘 Sancocho (traditional soup)',
  ];
  const SNACK_ITEMS = [
    '🥜 Trail mix & nuts', '🍌 Fresh tropical fruit', '🧀 Cheese & crackers',
    '🌮 Chips & guacamole', '🍪 Cookies & sweets', '🥤 Soft drinks & juices',
    '🍺 Beers / Coolers', '🍷 Wine / Cocktail fixings',
  ];
  const RESTRICTIONS = [
    'None', 'Vegetarian', 'Vegan', 'Gluten-free', 'No shellfish', 'No pork', 'Low carb', 'Other'
  ];

  function pluralize(n, s) { return n === 1 ? s : s + 's'; }

  // === Generate Grocery List ===
  function generateGrocery() {
    const g = state.guests;
    const d = state.days;

    // Estimate quantities per person per meal
    const grocery = {};
    function add(item, qty, unit) {
      if (!grocery[item]) grocery[item] = { qty: 0, unit };
      grocery[item].qty += qty;
    }

    // Breakfast ingredients (per person)
    state.breakfast.forEach(item => {
      if (item.includes('Pancakes')) { add('Flour (cups)', g * 0.5 * d, 'cups'); add('Eggs', g * 2 * d, 'units'); add('Maple syrup', 1, 'bottle'); }
      if (item.includes('Eggs')) add('Eggs', g * 2 * d, 'units');
      if (item.includes('Avocado')) add('Avocados', g * 0.5 * d, 'units');
      if (item.includes('Burrito')) { add('Tortillas', g * 1.5 * d, 'units'); add('Eggs', g * 1.5 * d, 'units'); }
      if (item.includes('Granola')) { add('Granola (cups)', g * 0.4 * d, 'cups'); add('Yogurt (L)', g * 0.2 * d, 'L'); }
      if (item.includes('Fruit bowl')) add('Mixed tropical fruit (kg)', g * 0.3 * d, 'kg');
      if (item.includes('Full breakfast')) { add('Eggs', g * 2 * d, 'units'); add('Bacon (kg)', g * 0.15 * d, 'kg'); add('Bread (loaves)', d * 0.5, 'loaves'); }
      if (item.includes('Smoothie')) { add('Bananas', g * 0.5 * d, 'units'); add('Mango (units)', g * 0.5 * d, 'units'); add('Yogurt (L)', g * 0.15 * d, 'L'); }
    });

    // Lunch
    state.lunch.forEach(item => {
      if (item.includes('Ceviche')) { add('Fresh fish (kg)', g * 0.25 * d, 'kg'); add('Limes', g * 2 * d, 'units'); add('Onions', g * 0.5 * d, 'units'); }
      if (item.includes('Fish tacos')) { add('Fish fillets', g * 1.5 * d, 'units'); add('Tortillas', g * 2 * d, 'units'); add('Cabbage', 1, 'head'); }
      if (item.includes('Sandwiches')) { add('Bread (loaves)', d * 0.5, 'loaves'); add('Deli meat (kg)', g * 0.1 * d, 'kg'); add('Cheese (kg)', g * 0.1 * d, 'kg'); }
      if (item.includes('Paella')) { add('Rice (kg)', g * 0.15 * d, 'kg'); add('Seafood mix (kg)', g * 0.2 * d, 'kg'); add('Bell peppers', g * 0.3 * d, 'units'); }
      if (item.includes('Pasta salad')) { add('Pasta (kg)', g * 0.15 * d, 'kg'); add('Cherry tomatoes (kg)', g * 0.15 * d, 'kg'); add('Olive oil (L)', 1, 'bottle'); }
      if (item.includes('Grilled chicken')) { add('Chicken breasts', g * 1 * d, 'units'); add('Mixed salad greens (kg)', g * 0.15 * d, 'kg'); }
    });

    // Dinner
    state.dinner.forEach(item => {
      if (item.includes('Grilled fresh catch')) { add('Fresh catch (kg)', g * 0.35 * d, 'kg'); add('Limes', g * 2 * d, 'units'); add('Mixed vegetables (kg)', g * 0.2 * d, 'kg'); }
      if (item.includes('Garlic shrimp')) { add('Shrimp (kg)', g * 0.3 * d, 'kg'); add('Rice (kg)', g * 0.15 * d, 'kg'); add('Garlic (heads)', 2, 'heads'); }
      if (item.includes('Grilled steak')) { add('Steak (kg)', g * 0.35 * d, 'kg'); add('Potatoes (kg)', g * 0.25 * d, 'kg'); }
      if (item.includes('Curry')) { add('Chicken or chickpeas (kg)', g * 0.2 * d, 'kg'); add('Coconut milk (cans)', g * 0.3 * d, 'cans'); add('Rice (kg)', g * 0.15 * d, 'kg'); }
      if (item.includes('Taco night')) { add('Ground meat (kg)', g * 0.2 * d, 'kg'); add('Taco shells', g * 1.5 * d, 'units'); add('Salsa (jars)', 2, 'jars'); }
      if (item.includes('Pasta with seafood')) { add('Pasta (kg)', g * 0.2 * d, 'kg'); add('Mixed seafood (kg)', g * 0.25 * d, 'kg'); add('Tomato sauce (jars)', 2, 'jars'); }
      if (item.includes('BBQ')) { add('Meat for BBQ (kg)', g * 0.4 * d, 'kg'); add('Sausages', g * 1 * d, 'units'); add('BBQ sauce', 1, 'bottle'); }
      if (item.includes('Sancocho')) { add('Chicken (kg)', g * 0.3 * d, 'kg'); add('Yuca (kg)', g * 0.25 * d, 'kg'); add('Plantains', g * 0.5 * d, 'units'); }
    });

    // Snacks & Drinks
    state.snacks.forEach(item => {
      if (item.includes('Trail mix')) add('Trail mix (kg)', g * 0.1 * d, 'kg');
      if (item.includes('Tropical fruit')) add('Assorted fresh fruit (kg)', g * 0.3 * d, 'kg');
      if (item.includes('Cheese')) add('Cheese & crackers platter', 1, 'platter');
      if (item.includes('Chips & guac')) { add('Tortilla chips (bags)', d, 'bags'); add('Avocados', g * 0.3 * d, 'units'); add('Limes', g * 1 * d, 'units'); }
      if (item.includes('Soft drinks')) add('Assorted soft drinks (L)', g * 1 * d, 'L');
      if (item.includes('Beers')) add('Beer (6-packs)', Math.ceil(g * 0.5 * d / 6) + 1, '6-packs');
      if (item.includes('Wine')) add('Wine bottles', Math.ceil(g * 0.3 * d), 'bottles');
    });

    return grocery;
  }

  // === Build Summary & Grocery Output ===
  function showSummary() {
    let text = `📋 **Your Menu Plan – ${state.guests} ${pluralize(state.guests, 'guest')}, ${state.days} ${pluralize(state.days, 'day')}**\n\n`;

    if (state.restrictions.length) text += `🥗 Dietary: ${state.restrictions.join(', ')}\n\n`;

    const sections = [
      ['🌅 Breakfast', state.breakfast],
      ['☀️ Lunch', state.lunch],
      ['🌙 Dinner', state.dinner],
      ['🍿 Snacks & Drinks', state.snacks],
    ];

    sections.forEach(([icon, items]) => {
      if (items.length) text += `${icon}\n${items.map(i => '• ' + i.replace(/^[^\s]+\s/, '')).join('\n')}\n\n`;
    });

    addBot(text.replace(/\*\*/g, '<strong>').replace(/\n/g, '<br>'));

    // Generate grocery list
    const grocery = generateGrocery();

    const sorted = Object.entries(grocery).sort((a, b) => a[0].localeCompare(b[0]));

    let groceryHtml = '<div class="grocery-list"><h3>📦 Shopping List</h3><ul>';
    sorted.forEach(([item, data]) => {
      const qty = typeof data.qty === 'number' ? (data.qty % 1 === 0 ? data.qty : data.qty.toFixed(1)) : data.qty;
      groceryHtml += `<li><span>${item}</span><span class="qty">${qty} ${data.unit}</span></li>`;
    });
    groceryHtml += '</ul></div>';

    const groceryWrap = document.createElement('div');
    groceryWrap.innerHTML = groceryHtml;
    addBot('<strong>🛒 Auto-generated Grocery List</strong>', groceryWrap.firstElementChild);

    // Save & share buttons
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-top:12px;';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'opt-btn confirm';
    copyBtn.textContent = '📋 Copy List to Clipboard';
    copyBtn.onclick = () => {
      let list = '🛒 GROCERY LIST\n═══════════════════\n\n';
      list += `Guests: ${state.guests} • Duration: ${state.days} ${pluralize(state.days, 'day')}\n`;
      if (state.restrictions.length) list += `Restrictions: ${state.restrictions.join(', ')}\n`;
      list += '\n';
      sections.forEach(([icon, items]) => {
        if (items.length) {
          list += `${icon}\n`;
          items.forEach(i => list += `  • ${i}\n`);
          list += '\n';
        }
      });
      list += 'SHOPPING LIST\n';
      list += '──────────────\n';
      sorted.forEach(([item, data]) => {
        const qty = typeof data.qty === 'number' ? (data.qty % 1 === 0 ? data.qty : data.qty.toFixed(1)) : data.qty;
        list += `  ☐ ${item} — ${qty} ${data.unit}\n`;
      });
      navigator.clipboard.writeText(list).then(() => {
        copyBtn.textContent = '✅ Copied!';
        setTimeout(() => copyBtn.textContent = '📋 Copy List to Clipboard', 2000);
      });
    };
    btnWrap.appendChild(copyBtn);

    // WhatsApp share button
    const waBtn = document.createElement('button');
    waBtn.className = 'opt-btn confirm';
    waBtn.style.background = '#25D366';
    waBtn.style.borderColor = '#25D366';
    waBtn.textContent = '📱 Share via WhatsApp';
    waBtn.onclick = () => {
      let shareText = '🛒 *My Grocery List*\n\n';
      sorted.forEach(([item, data]) => {
        const qty = typeof data.qty === 'number' ? (data.qty % 1 === 0 ? data.qty : data.qty.toFixed(1)) : data.qty;
        shareText += `☐ ${item} — ${qty} ${data.unit}\n`;
      });
      const url = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
      window.open(url, '_blank');
    };
    btnWrap.appendChild(waBtn);

    addBot('', btnWrap);

    hideInput();
  }

  // === Conversation Flow ===
  function start() {
    addBot('👋 Hey! Let\'s plan your meals on the water.<br>I\'ll make a grocery list for the boat.');

    setTimeout(() => {
      addBot('First — <strong>how many guests</strong> are coming?');
      showInput('e.g. 4', val => {
        const n = parseInt(val);
        if (isNaN(n) || n < 1) return addBot('Please enter a number: 2, 4, 6...');
        state.guests = n;
        setTimeout(() => askDays(), 400);
      });
    }, 500);
  }

  function askDays() {
    addBot(`Great, ${state.guests} ${pluralize(state.guests, 'guest')}! 🎉<br><strong>How many days</strong> will you be on the boat?`);
    showInput('e.g. 3', val => {
      const n = parseInt(val);
      if (isNaN(n) || n < 1) return addBot('Enter a number of days: 1, 2, 3...');
      state.days = n;
      setTimeout(() => askRestrictions(), 400);
    });
  }

  function askRestrictions() {
    addBot(`${state.guests} people, ${state.days} ${pluralize(state.days, 'day')}. 🌴<br>Any <strong>dietary restrictions</strong>? (tap all that apply)`);
    const wrap = showOptions(RESTRICTIONS, true);
    state.currentQuestion = sel => {
      state.restrictions = sel;
      setTimeout(() => askMeals('breakfast', BREAKFAST_ITEMS, '🌅 Let\'s start with <strong>Breakfast</strong>! Pick what sounds good:'), 400);
    };
    addBot('', wrap);
  }

  function askMeals(slot, items, question) {
    addBot(question);
    const wrap = showOptions(items, true);
    state.currentQuestion = sel => {
      state[slot] = sel;
      const next = {
        breakfast: () => askMeals('lunch', LUNCH_ITEMS, '☀️ Great! Now for <strong>Lunch</strong> — what sounds good?'),
        lunch: () => askMeals('dinner', DINNER_ITEMS, '🌙 Perfect. <strong>Dinner</strong> — the main event!'),
        dinner: () => askMeals('snacks', SNACK_ITEMS, '🍿 Almost done! <strong>Snacks & Drinks</strong> for the trip?'),
        snacks: () => showSummary(),
      };
      setTimeout(next[slot], 400);
    };
    addBot('', wrap);
  }

  // Go!
  start();
})();
</script>
</body>
</html>
